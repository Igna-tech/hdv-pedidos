<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#111827">
    <title>HDV Pedidos - Vendedores</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        :root {
            --grafito: #1f2937;
            --grafito-oscuro: #111827;
        }

        body { background-color: #f3f4f6; -webkit-tap-highlight-color: transparent; font-family: 'Inter', system-ui, -apple-system, sans-serif; }

        /* Product grid animations */
        .product-card {
            animation: cardFadeIn 0.3s ease both;
        }
        @keyframes cardFadeIn {
            from { opacity: 0; transform: scale(0.95) translateY(8px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Lazy image container: skeleton pulse while loading */
        .product-card .bg-gray-50 {
            position: relative;
            overflow: hidden;
        }
        .product-card .bg-gray-50::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, #f3f4f6 25%, #e5e7eb 50%, #f3f4f6 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            z-index: 0;
        }
        .product-card .bg-gray-50 img[src] { position: relative; z-index: 1; }
        .product-card .bg-gray-50 span { position: relative; z-index: 1; }

        /* Category chip transitions */
        .category-btn {
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .category-btn.active {
            box-shadow: 0 2px 8px rgba(17, 24, 39, 0.25);
        }

        /* Off-canvas cart drawer */
        #cartDrawer {
            transform: translateX(100%);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #cartDrawer.open {
            transform: translateX(0);
        }
        #cartBackdrop {
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }
        #cartBackdrop.open {
            opacity: 1;
            pointer-events: auto;
        }

        .dark-mode { background-color: var(--grafito-oscuro) !important; color: white; }
        .dark-mode .bg-white { background-color: var(--grafito) !important; color: white; border-color: #374151; }
        .dark-mode .text-gray-800 { color: #f3f4f6 !important; }
        .dark-mode .text-gray-500 { color: #9ca3af !important; }
        .dark-mode .skeleton { background: #374151 !important; }
        .dark-mode .skeleton::after { background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent) !important; }

        /* ==========================================
           A11Y - Focus visible & Microinteractions
           ========================================== */
        *:focus-visible {
            outline: 2px solid #6366f1;
            outline-offset: 2px;
            border-radius: 4px;
        }
        button, [role="button"], a, select, label[for], .cursor-pointer { cursor: pointer; }
        button:active:not(:disabled) { transform: scale(0.97); }

        /* Form inputs focus */
        input:not([type="checkbox"]):not([type="radio"]):not([type="file"]),
        textarea, select {
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        input:not([type="checkbox"]):not([type="radio"]):not([type="file"]):focus,
        textarea:focus, select:focus {
            border-color: #6366f1 !important;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        /* ==========================================
           Skeleton Loaders
           ========================================== */
        .skeleton {
            background: #e5e7eb;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
        }
        .skeleton::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* ==========================================
           Animations & Transitions
           ========================================== */
        #cart-count { animation: bounce 0.3s ease; }
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* Toast notifications */
        #toastContainer {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            z-index: 9999; display: flex; flex-direction: column-reverse; gap: 10px;
            pointer-events: none; width: 90%; max-width: 400px;
        }
        .toast {
            pointer-events: auto; padding: 14px 20px; border-radius: 14px;
            font-size: 13px; font-weight: 600; color: white;
            box-shadow: 0 8px 25px rgba(0,0,0,0.18);
            transform: translateY(30px); opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; gap: 10px;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast-success { background: #059669; }
        .toast-error { background: #dc2626; }
        .toast-info { background: #374151; }
        .toast-warning { background: #d97706; }

        /* Confirm modal */
        .confirm-backdrop {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            z-index: 10000; display: flex; align-items: center; justify-content: center;
            padding: 1rem; animation: confirmFadeIn 0.2s ease;
        }
        .confirm-box {
            background: white; border-radius: 20px; max-width: 340px; width: 100%;
            padding: 28px 24px 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: confirmSlideUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes confirmFadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes confirmSlideUp { from { opacity: 0; transform: scale(0.9) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        /* Empty state */
        .empty-state { display: flex; flex-direction: column; align-items: center; padding: 3rem 1rem; }
        .empty-state svg { width: 120px; height: 120px; margin-bottom: 1rem; opacity: 0.6; }
        .empty-state p { color: #6b7280; font-weight: 600; font-size: 0.875rem; text-align: center; }
        .empty-state .empty-sub { color: #9ca3af; font-weight: 400; font-size: 0.75rem; margin-top: 0.25rem; }
    </style>
</head>
<body class="pb-24 transition-colors duration-200">

    <header class="bg-[#111827] text-white p-4 sticky top-0 z-50 shadow-lg">
        <div class="flex justify-between items-center mb-3">
            <div class="flex items-center gap-3">
                <svg width="44" height="44" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <rect width="100" height="100" rx="16" fill="#111827"/>
                    <rect x="4" y="4" width="92" height="92" rx="12" fill="none" stroke="#DC2626" stroke-width="2.5"/>
                    <text x="50" y="52" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="38" fill="#DC2626" text-anchor="middle" dominant-baseline="central" letter-spacing="2">HDV</text>
                    <text x="50" y="78" font-family="Arial, sans-serif" font-weight="700" font-size="9.5" fill="#FFFFFF" text-anchor="middle" letter-spacing="4">DISTRIBUCIONES</text>
                </svg>
                <div>
                    <h1 class="text-lg font-bold leading-tight">HDV Pedidos</h1>
                    <div id="status-badge" class="text-[10px] uppercase tracking-wider font-bold opacity-80 flex items-center">
                        <span class="w-2 h-2 bg-green-500 rounded-full mr-2"></span> En linea
                    </div>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="forzarActualizacion()" class="p-2 bg-gray-800 rounded-full text-gray-300 hover:text-white transition-colors" aria-label="Forzar actualizacion"><i data-lucide="refresh-cw" class="w-4 h-4"></i></button>
                <button onclick="toggleDarkMode()" class="p-2 bg-gray-800 rounded-full text-gray-300 hover:text-white transition-colors dark-mode-toggle" aria-label="Cambiar modo oscuro"><i data-lucide="moon" class="w-4 h-4"></i></button>
            </div>
        </div>
        
        <div class="bg-gray-800 rounded-xl p-3 flex items-center justify-between border border-gray-700 transition-colors" id="btnSeleccionarCliente">
            <div class="flex items-center w-full">
                <i data-lucide="user" class="w-4 h-4 mr-3 text-gray-400"></i>
                <div class="w-full relative" id="clienteSelectContainer">
                    <select id="clienteSelect" aria-label="Seleccionar cliente" class="w-full bg-transparent text-sm font-medium outline-none text-white appearance-none">
                        <option value="" class="text-black">-- Seleccione Cliente --</option>
                    </select>
                </div>
            </div>
            <i data-lucide="chevron-down" class="w-4 h-4 text-gray-500 ml-2 shrink-0"></i>
        </div>
    </header>

    <div id="toastContainer"></div>

    <div class="bg-white border-b border-gray-200 sticky top-[125px] z-40 overflow-x-auto no-scrollbar flex p-3 gap-2" id="categoryFilters">
        <button class="px-4 py-2 bg-gray-900 text-white rounded-full text-xs font-bold whitespace-nowrap active category-btn">Todas</button>
    </div>

    <div class="p-4" id="searchContainer">
        <div class="relative">
            <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
            <input type="text" id="searchInput" placeholder="Buscar producto..." disabled aria-label="Buscar producto"
                   class="w-full bg-white border border-gray-300 rounded-xl py-3 pl-10 pr-4 text-sm outline-none transition-all shadow-sm">
        </div>
    </div>

    <main class="px-4 space-y-4 pb-10" id="productsContainer" role="main">
        <div class="grid grid-cols-2 sm:grid-cols-3 gap-3" aria-label="Cargando catalogo">
            <div class="bg-white rounded-xl p-3 shadow-sm border border-gray-100"><div class="skeleton w-full h-28 mb-2"></div><div class="skeleton h-4 w-3/4 mb-1"></div><div class="skeleton h-3 w-1/2"></div></div>
            <div class="bg-white rounded-xl p-3 shadow-sm border border-gray-100"><div class="skeleton w-full h-28 mb-2"></div><div class="skeleton h-4 w-3/4 mb-1"></div><div class="skeleton h-3 w-1/2"></div></div>
            <div class="bg-white rounded-xl p-3 shadow-sm border border-gray-100"><div class="skeleton w-full h-28 mb-2"></div><div class="skeleton h-4 w-3/4 mb-1"></div><div class="skeleton h-3 w-1/2"></div></div>
            <div class="bg-white rounded-xl p-3 shadow-sm border border-gray-100"><div class="skeleton w-full h-28 mb-2"></div><div class="skeleton h-4 w-3/4 mb-1"></div><div class="skeleton h-3 w-1/2"></div></div>
            <div class="bg-white rounded-xl p-3 shadow-sm border border-gray-100"><div class="skeleton w-full h-28 mb-2"></div><div class="skeleton h-4 w-3/4 mb-1"></div><div class="skeleton h-3 w-1/2"></div></div>
            <div class="bg-white rounded-xl p-3 shadow-sm border border-gray-100"><div class="skeleton w-full h-28 mb-2"></div><div class="skeleton h-4 w-3/4 mb-1"></div><div class="skeleton h-3 w-1/2"></div></div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 px-4 py-3 flex justify-between items-center z-50 shadow-[0_-4px_10px_rgba(0,0,0,0.05)]" role="navigation" aria-label="Navegacion principal">
        <button onclick="cambiarVistaVendedor('lista')" id="btn-tab-lista" class="flex flex-col items-center gap-1 text-gray-900 transition-colors">
            <i data-lucide="home" class="w-5 h-5"></i>
            <span class="text-[10px] font-bold">Inicio</span>
        </button>

        <button onclick="cambiarVistaVendedor('zonas')" id="btn-tab-zonas" class="flex flex-col items-center gap-1 text-gray-400 transition-colors">
            <i data-lucide="map-pin" class="w-5 h-5"></i>
            <span class="text-[10px] font-bold">Zonas</span>
        </button>

        <button onclick="mostrarModalCarrito()" id="viewCartBtn" aria-label="Ver carrito de compras" class="relative -mt-12 bg-[#111827] text-white p-4 rounded-full shadow-xl border-4 border-gray-100 disabled:opacity-50 disabled:bg-gray-400">
            <i data-lucide="shopping-cart" class="w-6 h-6"></i>
            <span id="cartItems" class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center border-2 border-white">0</span>
        </button>

        <button onclick="cambiarVistaVendedor('pedidos')" id="btn-tab-pedidos" class="flex flex-col items-center gap-1 text-gray-400 transition-colors">
            <i data-lucide="file-text" class="w-5 h-5"></i>
            <span class="text-[10px] font-bold">Pedidos</span>
        </button>

        <button onclick="cambiarVistaVendedor('caja')" id="btn-tab-caja" class="flex flex-col items-center gap-1 text-gray-400 transition-colors">
            <i data-lucide="wallet" class="w-5 h-5"></i>
            <span class="text-[10px] font-bold">Mi Caja</span>
        </button>
    </nav>

    <!-- MODAL BACKUP VENDEDOR -->
    <div id="backupModal" class="fixed inset-0 bg-black/50 z-[100] hidden flex items-end">
        <div class="bg-white w-full rounded-t-3xl max-h-[85vh] overflow-y-auto p-6 shadow-2xl pb-10">
            <div class="w-12 h-1.5 bg-gray-300 rounded-full mx-auto mb-6"></div>
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-gray-900">Copia de Seguridad</h3>
                <button onclick="cerrarModalBackup()" class="text-gray-400 p-2" aria-label="Cerrar"><i data-lucide="x"></i></button>
            </div>

            <div class="bg-blue-50 border border-blue-200 rounded-xl p-4 mb-4">
                <p class="text-sm text-blue-800 font-medium" id="backupInfoText">Gestiona tus copias de seguridad</p>
                <p class="text-xs text-blue-600 mt-1" id="backupInfoDate"></p>
            </div>

            <div class="bg-gray-50 rounded-xl p-4 mb-4 flex items-center justify-between">
                <div>
                    <p class="font-bold text-gray-800 text-sm">Auto-backup</p>
                    <p class="text-xs text-gray-500">Guarda cada 5 min en el dispositivo</p>
                </div>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="autoBackupToggle" class="sr-only peer" onchange="toggleAutoBackup()" checked>
                    <div class="w-11 h-6 bg-gray-200 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-green-500"></div>
                </label>
            </div>

            <div class="space-y-3">
                <button onclick="exportarBackupVendedor()" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold text-sm flex items-center justify-center gap-2 active:scale-95 transition-transform">
                    <i data-lucide="download" class="w-4 h-4"></i> Descargar Backup Completo
                </button>
                <button onclick="exportarSoloPedidos()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-sm flex items-center justify-center gap-2 active:scale-95 transition-transform">
                    <i data-lucide="file-text" class="w-4 h-4"></i> Descargar Solo Pedidos
                </button>
                <button onclick="compartirBackupWhatsApp()" class="w-full bg-[#25D366] text-white py-4 rounded-xl font-bold text-sm flex items-center justify-center gap-2 active:scale-95 transition-transform">
                    <i data-lucide="send" class="w-4 h-4"></i> Enviar Resumen por WhatsApp
                </button>
                <button onclick="document.getElementById('restaurarFileVendedor').click()" class="w-full bg-yellow-500 text-white py-4 rounded-xl font-bold text-sm flex items-center justify-center gap-2 active:scale-95 transition-transform">
                    <i data-lucide="upload" class="w-4 h-4"></i> Restaurar desde Backup
                </button>
                <input type="file" id="restaurarFileVendedor" accept=".json" style="display:none;" onchange="restaurarBackupVendedor(event)">

                <div class="mt-4">
                    <p class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Auto-Backups Guardados</p>
                    <div id="historialBackups" class="space-y-2 max-h-40 overflow-y-auto">
                        <p class="text-xs text-gray-400 italic">Sin historial</p>
                    </div>
                </div>
            </div>
            <button onclick="cerrarModalBackup()" class="w-full mt-6 bg-gray-100 text-gray-700 py-3 rounded-xl font-bold">Cerrar</button>
        </div>
    </div>

    <!-- Cart Drawer (Off-canvas right panel) -->
    <div id="cartBackdrop" class="fixed inset-0 bg-black/50 z-[100] hidden" onclick="closeCartModal()"></div>
    <div id="cartDrawer" class="fixed top-0 right-0 bottom-0 w-full max-w-md bg-white z-[101] flex flex-col shadow-2xl">
        <!-- Fixed header -->
        <div class="flex items-center justify-between px-5 py-4 border-b border-gray-100 shrink-0">
            <div class="flex items-center gap-3">
                <i data-lucide="shopping-cart" class="w-5 h-5 text-gray-700"></i>
                <h3 class="text-lg font-bold text-gray-900">Tu Pedido</h3>
                <span id="drawerCartCount" class="bg-gray-100 text-gray-700 text-xs font-bold px-2 py-0.5 rounded-full">0</span>
            </div>
            <button onclick="closeCartModal()" class="p-2 hover:bg-gray-100 rounded-full transition-colors" aria-label="Cerrar">
                <i data-lucide="x" class="w-5 h-5 text-gray-500"></i>
            </button>
        </div>

        <!-- Scrollable content -->
        <div class="flex-1 overflow-y-auto px-5 py-4 space-y-3">
            <div id="cartItemsList" class="space-y-2"></div>

            <div class="space-y-3 pt-3">
                <div class="bg-gray-50 p-3 rounded-xl">
                    <label class="block text-[11px] font-bold text-gray-500 mb-1.5 uppercase tracking-wider">Tipo de Pago</label>
                    <select id="tipoPago" class="w-full bg-white border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none font-medium">
                        <option value="contado">Al Contado</option>
                        <option value="credito">A Credito</option>
                    </select>
                </div>

                <div class="bg-gray-50 p-3 rounded-xl">
                    <label class="block text-[11px] font-bold text-gray-500 mb-1.5 uppercase tracking-wider">Descuento (%)</label>
                    <div class="flex gap-2">
                        <input type="number" id="descuento" value="0" min="0" max="100" class="flex-1 bg-white border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none font-bold">
                        <button onclick="aplicarDescuento()" class="bg-gray-800 text-white px-4 rounded-lg text-sm font-bold hover:bg-gray-700 transition-colors">Aplicar</button>
                    </div>
                </div>

                <div class="bg-gray-50 p-3 rounded-xl">
                    <label class="block text-[11px] font-bold text-gray-500 mb-1.5 uppercase tracking-wider">Notas</label>
                    <textarea id="notasPedido" rows="2" class="w-full bg-white border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none" placeholder="Ej. Entregar de tarde..."></textarea>
                </div>
            </div>
        </div>

        <!-- Sticky footer -->
        <div class="border-t border-gray-100 px-5 py-4 space-y-3 shrink-0 bg-white">
            <div id="totalSection" class="space-y-2 hidden"></div>
            <div class="flex gap-3">
                <button onclick="closeCartModal()" class="flex-1 bg-gray-100 text-gray-700 py-3.5 rounded-xl font-bold text-sm hover:bg-gray-200 transition-colors">Volver</button>
                <button onclick="confirmarPedido()" class="flex-1 bg-[#111827] text-white py-3.5 rounded-xl font-bold text-sm shadow-lg hover:bg-gray-800 transition-colors">
                    <span class="flex items-center justify-center gap-2"><i data-lucide="check" class="w-4 h-4"></i> Confirmar</span>
                </button>
            </div>
        </div>
    </div>

    <script>lucide.createIcons();</script>
    <script src="firebase-config.js"></script>
    <script src="app.js"></script>
    <iframe id="printFrameVendedor" style="display:none;"></iframe>


</body>
</html>
