name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

  css:
    name: Tailwind CSS Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build:css
      - name: Check for uncommitted CSS changes
        run: |
          if ! git diff --quiet dist/tailwind.css; then
            echo "::error::dist/tailwind.css is out of date. Run 'npm run build:css' and commit."
            git diff --stat dist/tailwind.css
            exit 1
          fi

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: unit
    env:
      TEST_URL: ${{ secrets.TEST_URL }}
      TEST_VENDOR_EMAIL: ${{ secrets.TEST_VENDOR_EMAIL }}
      TEST_VENDOR_PASSWORD: ${{ secrets.TEST_VENDOR_PASSWORD }}
      TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
      TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
